# Training configuration
model:
  name: bert-base-uncased
  hidden_size: 768
  num_layers: 12
  num_heads: 12
  dropout: 0.1

training:
  learning_rate: 2e-5
  batch_size: 32
  epochs: 5
  warmup_steps: 500
  weight_decay: 0.01
  optimizer: adamw
  scheduler: linear
  gradient_accumulation_steps: 4
  max_length: 512

dataset:
  name: imdb
  train_split: train
  eval_split: test

wandb:
  project: sentiment-analysis
  entity: ml-team
