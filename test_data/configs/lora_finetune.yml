# LoRA fine-tuning config
base_model: meta-llama/Llama-2-7b-hf
lora:
  r: 16
  alpha: 32
  dropout: 0.05
  target_modules:
    - q_proj
    - v_proj

training:
  learning_rate: 3e-4
  batch_size: 4
  gradient_accumulation_steps: 8
  epochs: 3
  warmup_ratio: 0.03
  quantization: 4bit

inference:
  max_new_tokens: 256
  temperature: 0.7
